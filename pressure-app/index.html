<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=DM+Mono:wght@300;400&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Pressure</title>
</head>

<body>
    <main class="app">

        <header class="location">
            <p id="city"></p>
            <button id="get-location">Get Location</button>
            <span id="date-time"></span>
        </header>

        <section class="dial-section">
            <div class="dial">
                <svg class="dial-tick-ring" id="dial-tick-svg" xmlns="http://www.w3.org/2000/svg"
                    style="position:absolute;inset:0;width:100%;height:100%;border-radius:50%;pointer-events:none;">
                </svg>
                <div class="dial-inner">
                    <h1></h1>
                    <div class="pressure-value"></div>
                    <p></p>
                </div>
            </div>
        </section>

        <div class="dial-divider"></div>

        <section class="insight">
            <p></p>
        </section>

        <section class="chips">
            <div class="chip">Temperature</div>
            <div class="chip">Air Quality</div>
            <div class="chip">Humidity</div>
            <div class="chip">UV</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
