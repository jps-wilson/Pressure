<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Playfair+Display:wght@400;500&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Pressure</title>
</head>

<body>
    <main class="app">

        <header class="location">
            <p id="city"></p>
            <div class="right">
                <button id="get-location">Get Location</button>
                <span id="date-time"></span>
            </div>
        </header>

        <section class="dial-section">
            <div class="dial">
                <div class="dial-inner">
                    <h1></h1>
                    <div class="pressure-value"></div>
                    <p></p>
                </div>
            </div>
        </section>

        <section class="insight">
            <p></p>
        </section>

        <section class="chips">
            <div class="chip">Air Quality</div>
            <div class="chip">Pressure ↓</div>
            <div class="chip">Humidity</div>
            <div class="chip">UV</div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
